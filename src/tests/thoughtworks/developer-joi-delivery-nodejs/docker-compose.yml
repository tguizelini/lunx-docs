services:
  db:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: joi_delivery_db
    ports:
      - "5432:5432"
    volumes:
      - joi_delivery_data:/var/lib/postgresql/data

volumes:
  joi_delivery_data:

# postgres://postgres:postgres@localhost:5432/joi_delivery_db