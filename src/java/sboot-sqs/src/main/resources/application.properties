spring.application.name=java-sqs
server.port=8082

# Spring Cloud AWS Configuration (padrao da documentacao oficial)
# Regiao AWS - obrigataria
spring.cloud.aws.region.static=us-east-1

# Credenciais AWS (opcional - Spring Boot detecta automaticamente na seguinte ordem):
# 1. IAM Role (quando executando em EC2/ECS/Lambda)
# 2. AWS Profile (~/.aws/credentials)
# 3. Variaveis de ambiente (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
# 4. Propriedades abaixo (nao recomendado para producao)
# spring.cloud.aws.credentials.access-key=YOUR_ACCESS_KEY
# spring.cloud.aws.credentials.secret-key=YOUR_SECRET_KEY

# Configuracao SQS
spring.cloud.aws.sqs.enabled=true

# Configuracoes customizadas da aplicacao
aws.sqs.queue-name=minha-fila
aws.sqs.account-id=123456789012